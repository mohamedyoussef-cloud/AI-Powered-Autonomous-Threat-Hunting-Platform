version: "3.9"

services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: threat_hunting
      POSTGRES_PASSWORD: threat_hunting
      POSTGRES_DB: threat_hunting_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
